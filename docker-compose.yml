services:
  postgres:
    image: postgres:16-alpine
    container_name: tides-2026-postgres
    restart: unless-stopped
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tides2026}
      POSTGRES_USER: ${POSTGRES_USER:-tides}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tides_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tides} -d ${POSTGRES_DB:-tides2026} -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10



volumes:
  postgres-data: