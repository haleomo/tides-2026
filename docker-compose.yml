services:
  postgres:
    image: postgres:16-alpine
    container_name: tides-2026-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tides2026}
      POSTGRES_USER: ${POSTGRES_USER:-tides}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tides_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tides} -d ${POSTGRES_DB:-tides2026} -h localhost -p ${POSTGRES_PORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tides-2026-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-tides}:${POSTGRES_PASSWORD:-tides_dev_password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-tides2026}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    volumes:
      # Host bind mount so uploaded photos survive image rebuilds
      - ./uploads:/app/uploads

volumes:
  postgres-data: